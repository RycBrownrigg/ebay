# nginx site config for ebay.rycsprojects.com.
#
# This is the pre-certbot HTTP-only version. On first deploy, run:
#   sudo cp infra/nginx/ebay.rycsprojects.com.conf \
#           /etc/nginx/sites-available/ebay.rycsprojects.com
#   sudo ln -s /etc/nginx/sites-available/ebay.rycsprojects.com \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d ebay.rycsprojects.com
#
# Certbot will rewrite this file in place on the VPS — adding the 443
# server block, the HTTP→HTTPS redirect, and the cert paths. Those edits
# are intentional and persist on the VPS; we keep the pre-certbot
# version in git as the canonical bootstrap.

server {
    listen 80;
    listen [::]:80;
    server_name ebay.rycsprojects.com;

    # Static SPA — Next.js static export output, deployed to:
    #   /var/www/projects/ebay/web/out/
    root /var/www/projects/ebay/web/out;
    index index.html;

    # Reasonable security defaults; HSTS + TLS-related headers will be
    # appended by certbot when it adds the 443 server block.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # gzip on common asset types
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # API → Hono container (compose binds it to 127.0.0.1:3001)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Long-cache fingerprinted Next.js assets
    location /_next/static/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static SPA routing — App Router static export emits route.html
    # files; resolve clean URLs without a misleading SPA fallback.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Serve Next.js's generated 404 page on any 404 (preserves status code)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
